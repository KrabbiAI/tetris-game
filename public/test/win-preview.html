<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Win Screen Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: monospace; overflow: hidden; }
.winscreen {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
}
.confetti {
  position: absolute; width: 12px; height: 12px; border-radius: 2px;
  animation: fall 2.5s ease-out forwards;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.content { z-index: 10; text-align: center; }
h1 { font-size: 3rem; background: linear-gradient(to right, #fbbf24, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
p { color: #22d3ee; font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
.sub { color: #6b7280; margin-bottom: 1rem; }
.button { padding: 1rem 2rem; background: linear-gradient(to right, #06b6d4, #a855f7); border: none; border-radius: 0.75rem; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div class="winscreen">
  <div class="content">
    <h1>🎉 SIEG! 🎉</h1>
    <p>1 LINIE GESCHAFFT!</p>
    <p class="sub">Score: 100 • Level: 1</p>
    <p style="color: #9ca3af; font-size: 0.875rem; margin-bottom: 1.5rem;">Das ist nur eine Demo — gebaut mit ein paar Chat-Nachrichten 🤖<br>Krabbi AI kann das — und noch viel mehr 🦀</p>
    <button class="button" onclick="location.reload()">NOCHMAL SPIELEN</button>
  </div>
</div>
<script>
const colors = ['#ff0','#f0f','#0ff','#0f0','#f00','#00f','#f80'];
for (let i = 0; i < 50; i++) {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDelay = Math.random() * 0.5 + 's';
  c.style.animationDuration = (2 + Math.random() * 2) + 's';
  document.body.appendChild(c);
}
</script>
</body>
</html>
